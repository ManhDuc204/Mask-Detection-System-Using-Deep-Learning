<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Mask Detection</title>
    <!-- FIX: Đổi 'style.css' → 'styles.css' (bug typo) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="login-box">

    <h1>🛡️ ADMIN LOGIN</h1>

    <!-- FIX: Hiển thị lỗi nếu sai tài khoản -->
    {% if error %}
    <p style="color:#f87171; margin-bottom:10px;">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               autocomplete="username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               autocomplete="current-password"
               required>

        <button type="submit">LOGIN</button>

    </form>

</div>

</body>
</html>
